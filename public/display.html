<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>중앙 문제 화면</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* 💡 화면 스크롤을 완전히 없애고 꽉 차게 만드는 마법의 CSS */
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #222; color: white; display: flex; height: 100vh; overflow: hidden; }

        /* ⬅️ 왼쪽 패널 (참가자 점수판) */
        #left-panel { width: 260px; min-width: 260px; background-color: #2a2a2a; border-right: 3px solid #444; padding: 20px; box-sizing: border-box; overflow-y: auto; display: flex; flex-direction: column; }
        #left-panel h3 { margin-top: 0; text-align: center; color: #4caf50; font-size: 22px; padding-bottom: 15px; border-bottom: 2px dashed #555; }
        #player-list { display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        .player-badge { display: flex; flex-direction: column; align-items: center; padding: 15px; border-radius: 12px; font-weight: bold; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); font-size: 18px;}
        .player-score { font-size: 26px; margin-top: 8px; background: rgba(0,0,0,0.3); padding: 5px 20px; border-radius: 8px; }

        /* ➡️ 오른쪽 패널 (찾을 단어 리스트) */
        #right-panel { width: 260px; min-width: 260px; background-color: #2a2a2a; border-left: 3px solid #444; padding: 20px; box-sizing: border-box; overflow-y: auto; display: flex; flex-direction: column; }
        #right-panel h3 { margin-top: 0; text-align: center; color: #ff9800; font-size: 22px; padding-bottom: 15px; border-bottom: 2px dashed #555; }
        #word-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .word-item { font-size: 20px; font-weight: bold; padding: 10px; background: #444; border-radius: 8px; text-align: center; transition: 0.3s; color: white; border: 2px solid transparent;}
        .found { text-decoration: line-through; color: #777; background: transparent; border: 2px solid #555; }

        /* 🎯 중앙 패널 (메인 퍼즐) */
        #center-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; background-color: #1a1a1a; }
        #center-panel h2 { margin: 0 0 15px 0; color: #2196f3; font-size: 28px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        /* 💡 최신 웹 기술(Container Queries)로 여백을 스스로 측정해 반응하는 마법 상자 */
        #board-wrapper { flex: 1; width: 100%; display: flex; justify-content: center; align-items: center; container-type: size; }

        #puzzle-grid {
            position: relative;
            border: 4px solid #fff;
            background-color: #333;
            z-index: 0;
            display: grid;
            
            /* 💡 부모의 가로(cqw)와 세로(cqh) 중 '더 짧은 쪽'에 100% 딱 맞게 정사각형으로 조절! */
            width: min(100cqw, 100cqh);
            height: min(100cqw, 100cqh);
            
            box-sizing: border-box;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cell {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            /* 자바스크립트 없이 폰트 크기까지 자동 조절 (판 크기에 비례) */
            font-size: calc(min(100cqw, 100cqh) / var(--grid-size, 10) * 0.55);
        }

        .answer-line { position: absolute; border-radius: 50px; opacity: 0.9; z-index: 1; pointer-events: none; transition: all 0.5s ease; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div id="left-panel">
        <h3>🏆 참가 팀 (점수)</h3>
        <div id="player-list"><span style="color: gray; text-align: center;">대기 중...</span></div>
    </div>

    <div id="center-panel">
        <h2>📺 단어 찾기 퍼즐</h2>
        <div id="board-wrapper"></div>
    </div>

    <div id="right-panel">
        <h3>🔍 찾을 단어</h3>
        <div id="word-list"><span style="color: gray; text-align: center;">대기 중...</span></div>
    </div>

    <script>
        const socket = io();
        let size = 10; 
        let grid = [];
        let localFoundLines = []; 

        socket.on('updatePlayers', (players) => {
            const listElement = document.getElementById('player-list');
            listElement.innerHTML = '';
            if (players.length === 0) {
                listElement.innerHTML = '<span style="color: gray; text-align: center;">대기 중...</span>';
                return;
            }
            players.forEach(p => {
                const badge = document.createElement('div');
                badge.className = 'player-badge';
                badge.style.backgroundColor = p.color;
                badge.innerHTML = `<span>${p.name}</span><div class="player-score">${p.score} 점</div>`;
                listElement.appendChild(badge);
            });
        });

        function drawWordList(words, foundWords) {
            const wordContainer = document.getElementById('word-list');
            wordContainer.innerHTML = '';
            if (words.length === 0) {
                wordContainer.innerHTML = '<span style="color: gray; text-align: center;">대기 중...</span>';
                return;
            }
            words.forEach(word => {
                const span = document.createElement('div'); // 리스트 형태라 div 사용
                span.id = `word-${word}`;
                span.className = 'word-item';
                if (foundWords && foundWords.includes(word)) span.classList.add('found');
                span.innerText = word;
                wordContainer.appendChild(span);
            });
        }

        socket.on('syncPuzzle', (data) => {
            grid = data.grid;
            size = data.size || 10; 
            localFoundLines = data.foundLines || [];
            drawWordList(data.words, data.foundWords);
            drawGrid();

            if (localFoundLines.length > 0) {
                setTimeout(() => {
                    localFoundLines.forEach(line => {
                        drawLine(line.startX, line.startY, line.endX, line.endY, line.color);
                    });
                }, 100);
            }
        });

        socket.on('wordFound', (word) => {
            const span = document.getElementById(`word-${word}`);
            if (span) span.classList.add('found');
        });

        function drawGrid() {
            const boardWrapper = document.getElementById('board-wrapper');
            boardWrapper.innerHTML = '';
            
            let gridElement = document.createElement('div');
            gridElement.id = 'puzzle-grid';
            
            // 칸 개수에 맞게 Grid 나누기
            gridElement.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            gridElement.style.gridTemplateRows = `repeat(${size}, 1fr)`;
            
            // 💡 CSS에 현재 격자 크기(size)를 변수로 전달해서 폰트 크기 자동 조절에 사용!
            gridElement.style.setProperty('--grid-size', size);
            
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    let cellDiv = document.createElement('div');
                    cellDiv.className = 'cell';
                    cellDiv.id = `cell-${y}-${x}`;
                    cellDiv.innerText = grid[y][x] || '';
                    gridElement.appendChild(cellDiv);
                }
            }
            boardWrapper.appendChild(gridElement);
        }

        function drawLine(startX, startY, endX, endY, color) {
            const startCell = document.getElementById(`cell-${startY}-${startX}`);
            const endCell = document.getElementById(`cell-${endY}-${endX}`);
            const gridElement = document.getElementById('puzzle-grid');

            if (!startCell || !endCell) return;

            const x1 = startCell.offsetLeft + (startCell.offsetWidth / 2);
            const y1 = startCell.offsetTop + (startCell.offsetHeight / 2);
            const x2 = endCell.offsetLeft + (endCell.offsetWidth / 2);
            const y2 = endCell.offsetTop + (endCell.offsetHeight / 2);

            const length = Math.hypot(x2 - x1, y2 - y1) + startCell.offsetWidth;
            const angle = Math.atan2(y2 - y1, x2 - x1) * (180 / Math.PI);
            const cx = (x1 + x2) / 2;
            const cy = (y1 + y2) / 2;

            const line = document.createElement('div');
            line.className = 'answer-line';
            line.style.width = `${length}px`;
            line.style.height = `${startCell.offsetHeight}px`;
            line.style.backgroundColor = color;
            line.style.left = `${cx - length / 2}px`;
            line.style.top = `${cy - startCell.offsetHeight / 2}px`;
            line.style.transform = `rotate(${angle}deg)`;

            gridElement.appendChild(line);
        }

        socket.on('colorCells', (data) => {
            localFoundLines.push(data);
            drawLine(data.startX, data.startY, data.endX, data.endY, data.color);
        });

        // 인터넷 창 크기를 마우스로 잡고 늘렸다 줄였다 할 때 선을 다시 그리는 로직
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                document.querySelectorAll('.answer-line').forEach(el => el.remove());
                localFoundLines.forEach(line => {
                    drawLine(line.startX, line.startY, line.endX, line.endY, line.color);
                });
            }, 300);
        });
    </script>
</body>
</html>
