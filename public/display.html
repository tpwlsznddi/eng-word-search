<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>문제 화면</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #222; color: white; }
        #player-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 10px 0 20px 0; min-height: 40px; }
        .player-badge { display: flex; flex-direction: column; align-items: center; padding: 10px 15px; border-radius: 10px; font-weight: bold; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.4); min-width: 80px; }
        .player-score { font-size: 24px; margin-top: 5px; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 5px; }

        .word-list-box { background: #333; border: 2px solid #555; border-radius: 10px; padding: 15px; margin: 0 auto 20px auto; max-width: 600px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .word-item { font-size: 20px; font-weight: bold; padding: 5px 10px; background: #444; border-radius: 5px; transition: 0.3s; }
        .found { text-decoration: line-through; color: #888; background: transparent; }

        #board-wrapper { display: inline-flex; flex-direction: column; align-items: flex-start; }
        .top-labels { display: flex; padding-left: 54px; }
        .bottom-section { display: flex; }
        .left-labels { display: flex; flex-direction: column; margin-top: 4px; }
        .label { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; color: #aaa; }
        
        #puzzle-grid { position: relative; border: 4px solid #fff; background-color: #333; z-index: 0; }
        .row { display: flex; }
        .cell { position: relative; z-index: 2; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 28px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .answer-line { position: absolute; border-radius: 50px; opacity: 0.9; z-index: 1; pointer-events: none; transition: all 0.5s ease; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <h2>📺 중앙 문제 화면</h2>
    <div id="player-list"></div>
    <div class="word-list-box" id="word-list"><span style="color: gray;">대기 중...</span></div>
    <div id="board-wrapper"></div>

    <script>
        const socket = io();
        const size = 10;
        let grid = [];

        socket.on('updatePlayers', (players) => {
            const listElement = document.getElementById('player-list');
            listElement.innerHTML = '';
            if (players.length > 0) {
                players.forEach(p => {
                    const badge = document.createElement('div');
                    badge.className = 'player-badge';
                    badge.style.backgroundColor = p.color;
                    badge.innerHTML = `<span>${p.name}</span><div class="player-score">${p.score} 점</div>`;
                    listElement.appendChild(badge);
                });
            }
        });

        function drawWordList(words, foundWords) {
            const wordContainer = document.getElementById('word-list');
            wordContainer.innerHTML = '';
            words.forEach(word => {
                const span = document.createElement('span');
                span.id = `word-${word}`;
                span.className = 'word-item';
                if (foundWords && foundWords.includes(word)) span.classList.add('found');
                span.innerText = word;
                wordContainer.appendChild(span);
            });
        }

        socket.on('syncPuzzle', (data) => {
            grid = data.grid;
            drawWordList(data.words, data.foundWords);
            drawGrid();

            // 💡 새로 추가됨: 중간에 들어왔을 때 이미 찾아진 선들을 다시 그려줍니다.
            if (data.foundLines && data.foundLines.length > 0) {
                setTimeout(() => {
                    data.foundLines.forEach(line => {
                        drawLine(line.startX, line.startY, line.endX, line.endY, line.color);
                    });
                }, 100); // 격자판이 화면에 완전히 그려질 때까지 0.1초 기다린 후 선 긋기
            }
        });

        socket.on('wordFound', (word) => {
            const span = document.getElementById(`word-${word}`);
            if (span) span.classList.add('found');
        });

        function drawGrid() {
            const boardWrapper = document.getElementById('board-wrapper');
            boardWrapper.innerHTML = '';
            
            let topHeader = document.createElement('div');
            topHeader.className = 'top-labels';
            for (let x = 0; x < size; x++) {
                let labelDiv = document.createElement('div');
                labelDiv.className = 'label';
                labelDiv.innerText = String.fromCharCode(65 + x);
                topHeader.appendChild(labelDiv);
            }
            boardWrapper.appendChild(topHeader);

            let bottomSection = document.createElement('div');
            bottomSection.className = 'bottom-section';

            let leftLabels = document.createElement('div');
            leftLabels.className = 'left-labels';
            for (let y = 0; y < size; y++) {
                let labelDiv = document.createElement('div');
                labelDiv.className = 'label';
                labelDiv.innerText = y + 1;
                leftLabels.appendChild(labelDiv);
            }
            bottomSection.appendChild(leftLabels);

            let gridElement = document.createElement('div');
            gridElement.id = 'puzzle-grid';
            
            for (let y = 0; y < size; y++) {
                let rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                for (let x = 0; x < size; x++) {
                    let cellDiv = document.createElement('div');
                    cellDiv.className = 'cell';
                    cellDiv.id = `cell-${y}-${x}`;
                    cellDiv.innerText = grid[y][x] || '';
                    rowDiv.appendChild(cellDiv);
                }
                gridElement.appendChild(rowDiv);
            }
            bottomSection.appendChild(gridElement);
            boardWrapper.appendChild(bottomSection);
        }

        // 💡 중복 코드를 줄이기 위해 선 그리는 기능을 하나의 함수로 분리했습니다.
        function drawLine(startX, startY, endX, endY, color) {
            const startCell = document.getElementById(`cell-${startY}-${startX}`);
            const endCell = document.getElementById(`cell-${endY}-${endX}`);
            const gridElement = document.getElementById('puzzle-grid');

            if (!startCell || !endCell) return;

            const x1 = startCell.offsetLeft + (startCell.offsetWidth / 2);
            const y1 = startCell.offsetTop + (startCell.offsetHeight / 2);
            const x2 = endCell.offsetLeft + (endCell.offsetWidth / 2);
            const y2 = endCell.offsetTop + (endCell.offsetHeight / 2);

            const length = Math.hypot(x2 - x1, y2 - y1) + startCell.offsetWidth;
            const angle = Math.atan2(y2 - y1, x2 - x1) * (180 / Math.PI);
            const cx = (x1 + x2) / 2;
            const cy = (y1 + y2) / 2;

            const line = document.createElement('div');
            line.className = 'answer-line';
            line.style.width = `${length}px`;
            line.style.height = `${startCell.offsetHeight}px`;
            line.style.backgroundColor = color;
            line.style.left = `${cx - length / 2}px`;
            line.style.top = `${cy - startCell.offsetHeight / 2}px`;
            line.style.transform = `rotate(${angle}deg)`;

            gridElement.appendChild(line);
        }

        socket.on('colorCells', (data) => {
            drawLine(data.startX, data.startY, data.endX, data.endY, data.color);
        });
    </script>
</body>
</html>
