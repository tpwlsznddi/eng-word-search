<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>게임 참가</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 10px; background-color: #e3f2fd; margin: 0; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .login-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); width: 80%; max-width: 300px; }
        .login-box input { padding: 10px; font-size: 16px; width: 80%; text-align: center; margin-bottom: 15px; border: 2px solid #1976d2; border-radius: 6px; }
        .login-box button { padding: 10px 20px; font-size: 16px; background-color: #1976d2; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 80%; }

        #player-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 10px 0; }
        .player-badge { display: flex; flex-direction: column; align-items: center; padding: 5px 10px; border-radius: 8px; font-weight: bold; color: white; min-width: 50px; font-size: 12px; }
        .player-score { font-size: 16px; margin-top: 3px; background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 5px; }

        .word-list-box { background: white; border: 2px solid #1976d2; border-radius: 8px; padding: 10px; margin: 0 auto 15px auto; max-width: 95%; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .word-item { font-size: 14px; font-weight: bold; padding: 3px 6px; background: #e3f2fd; border-radius: 5px; transition: 0.3s; }
        .found { text-decoration: line-through; color: #aaa; background: transparent; }

        #board-wrapper { display: inline-flex; flex-direction: column; align-items: flex-start; margin-bottom: 20px; overflow-x: auto; max-width: 100%; padding-bottom: 10px;}
        .top-labels { display: flex; padding-left: 32px; }
        .bottom-section { display: flex; }
        .left-labels { display: flex; flex-direction: column; margin-top: 2px; }
        
        /* 💡 모바일에 맞춰 칸 크기 살짝 조정 */
        .label { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; color: #888; }
        
        #puzzle-grid { position: relative; border: 2px solid #1976d2; background-color: #fff; z-index: 0; user-select: none; touch-action: none; }
        .row { display: flex; }
        .cell { position: relative; z-index: 2; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .cell:hover { background-color: #bbdefb; border-radius: 5px; }
        
        .answer-line { position: absolute; border-radius: 50px; opacity: 0.5; z-index: 1; pointer-events: none; transition: all 0.3s ease; }

        .manual-input-box { padding: 10px; background: white; border-radius: 8px; border: 2px solid #1976d2; display: inline-block; margin-top: 5px; margin-bottom: 20px;}
        .manual-input-box input { width: 40px; text-align: center; font-size: 16px; padding: 5px; text-transform: uppercase; margin: 0 2px; border: 1px solid #ccc; border-radius: 4px; }
        .manual-input-box button { padding: 7px 12px; background-color: #1976d2; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h3 style="color: #1976d2; margin-top: 0;">팀 이름(닉네임) 입력!</h3>
            <input type="text" id="playerName" placeholder="예: 1조">
            <br>
            <button onclick="joinGame()">입장하기</button>
        </div>
    </div>

    <div id="player-list"></div>
    
    <div class="word-list-box" id="word-list"><span style="color: gray;">대기 중...</span></div>
    
    <div id="board-wrapper"></div>

    <div style="width: 100%;">
        <div class="manual-input-box">
            <span style="font-weight: bold; color: #1976d2; font-size: 14px;">좌표:</span>
            <input type="text" id="startCoord" placeholder="A1" maxlength="3"> ~ 
            <input type="text" id="endCoord" placeholder="E5" maxlength="3">
            <button onclick="submitManualAnswer()">제출</button>
        </div>
    </div>

    <script>
        const socket = io();
        const size = 10;
        let grid = [];
        let targetWords = [];
        let isDragging = false;
        let dragStart = null;
        let myName = "";

        function joinGame() {
            const nameInput = document.getElementById('playerName').value;
            if (nameInput.trim() === "") { alert("이름을 꼭 입력해 주세요!"); return; }
            myName = nameInput.trim();
            document.getElementById('login-screen').style.display = 'none';
            socket.emit('joinGame', myName);
        }

        socket.on('updatePlayers', (players) => {
            const listElement = document.getElementById('player-list');
            listElement.innerHTML = '';
            players.forEach(p => {
                const badge = document.createElement('div');
                badge.className = 'player-badge';
                badge.style.backgroundColor = p.color;
                const nameDisplay = p.name + (p.id === socket.id ? " (나)" : "");
                badge.innerHTML = `<span>${nameDisplay}</span><div class="player-score">${p.score}</div>`;
                listElement.appendChild(badge);
            });
        });

        function drawWordList(words, foundWords) {
            const wordContainer = document.getElementById('word-list');
            wordContainer.innerHTML = '';
            words.forEach(word => {
                const span = document.createElement('span');
                span.id = `word-${word}`;
                span.className = 'word-item';
                if (foundWords && foundWords.includes(word)) span.classList.add('found');
                span.innerText = word;
                wordContainer.appendChild(span);
            });
        }

        socket.on('syncPuzzle', (data) => {
            grid = data.grid;
            targetWords = data.words;
            drawWordList(data.words, data.foundWords);
            drawGrid();
        });

        socket.on('wordFound', (word) => {
            const span = document.getElementById(`word-${word}`);
            if (span) span.classList.add('found');
        });

        function drawGrid() {
            const boardWrapper = document.getElementById('board-wrapper');
            boardWrapper.innerHTML = '';
            
            let topHeader = document.createElement('div');
            topHeader.className = 'top-labels';
            let emptyCorner = document.createElement('div');
            emptyCorner.className = 'label';
            topHeader.appendChild(emptyCorner);
            for (let x = 0; x < size; x++) {
                let labelDiv = document.createElement('div');
                labelDiv.className = 'label';
                labelDiv.innerText = String.fromCharCode(65 + x);
                topHeader.appendChild(labelDiv);
            }
            boardWrapper.appendChild(topHeader);

            let bottomSection = document.createElement('div');
            bottomSection.className = 'bottom-section';

            let leftLabels = document.createElement('div');
            leftLabels.className = 'left-labels';
            for (let y = 0; y < size; y++) {
                let labelDiv = document.createElement('div');
                labelDiv.className = 'label';
                labelDiv.innerText = y + 1;
                leftLabels.appendChild(labelDiv);
            }
            bottomSection.appendChild(leftLabels);

            let gridElement = document.createElement('div');
            gridElement.id = 'puzzle-grid';
            
            // 💡 스마트폰 터치 및 화면 스크롤 방지 로직
            gridElement.addEventListener('touchmove', (e) => {
                if (isDragging) e.preventDefault(); // 드래그 중에 화면 스크롤 막기
            }, { passive: false });

            // 💡 스마트폰에서 손가락을 뗐을 때 위치 계산 로직
            gridElement.addEventListener('touchend', (e) => {
                if (!isDragging) return;
                isDragging = false;
                
                const touch = e.changedTouches[0];
                const endElement = document.elementFromPoint(touch.clientX, touch.clientY);
                
                if (endElement && endElement.classList.contains('cell')) {
                    const parts = endElement.id.split('-');
                    const endY = parseInt(parts[1]);
                    const endX = parseInt(parts[2]);
                    checkAnswer(dragStart.x, dragStart.y, endX, endY);
                }
            });

            gridElement.onmouseleave = () => { isDragging = false; };
            
            for (let y = 0; y < size; y++) {
                let rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                for (let x = 0; x < size; x++) {
                    let cellDiv = document.createElement('div');
                    cellDiv.className = 'cell';
                    cellDiv.id = `cell-${y}-${x}`;
                    cellDiv.innerText = grid[y][x] || '';
                    
                    // PC용 마우스 드래그
                    cellDiv.onmousedown = () => { isDragging = true; dragStart = { x, y }; };
                    cellDiv.onmouseup = () => {
                        if (isDragging) {
                            isDragging = false;
                            checkAnswer(dragStart.x, dragStart.y, x, y);
                        }
                    };

                    // 모바일 터치 드래그 시작
                    cellDiv.addEventListener('touchstart', (e) => {
                        isDragging = true; 
                        dragStart = { x, y };
                    }, { passive: false });

                    rowDiv.appendChild(cellDiv);
                }
                gridElement.appendChild(rowDiv);
            }
            bottomSection.appendChild(gridElement);
            boardWrapper.appendChild(bottomSection);
        }

        function parseCoord(str) {
            str = str.trim().toUpperCase();
            const match = str.match(/^([A-Z])(\d+)$/) || str.match(/^(\d+)([A-Z])$/);
            if (!match) return null;
            
            let letter, number;
            if (isNaN(match[1])) { 
                letter = match[1]; number = match[2];
            } else {               
                number = match[1]; letter = match[2];
            }
            
            const col = letter.charCodeAt(0) - 65;
            const row = parseInt(number) - 1;
            
            if (col < 0 || col >= size || isNaN(row) || row < 0 || row >= size) return null;
            return { x: col, y: row };
        }

        function submitManualAnswer() {
            const startStr = document.getElementById('startCoord').value;
            const endStr = document.getElementById('endCoord').value;
            const start = parseCoord(startStr);
            const end = parseCoord(endStr);
            if (!start || !end) { alert("좌표를 올바르게 입력해 주세요! (예: A1 또는 1A)"); return; }
            checkAnswer(start.x, start.y, end.x, end.y, true);
            document.getElementById('startCoord').value = '';
            document.getElementById('endCoord').value = '';
        }

        function checkAnswer(startX, startY, endX, endY, isManual = false) {
            let stepX = 0, stepY = 0;
            if (startX < endX) stepX = 1; else if (startX > endX) stepX = -1;
            if (startY < endY) stepY = 1; else if (startY > endY) stepY = -1;

            let selectedWord = "";
            let currX = startX, currY = startY;

            while (true) {
                if (currY < 0 || currY >= size || currX < 0 || currX >= size) break;
                selectedWord += grid[currY][currX];
                if (currX === endX && currY === endY) break;
                currX += stepX; currY += stepY;
            }

            const reversedWord = selectedWord.split('').reverse().join('');
            let actualWord = null;
            if (targetWords.includes(selectedWord)) actualWord = selectedWord;
            else if (targetWords.includes(reversedWord)) actualWord = reversedWord;

            if (actualWord) {
                const wordSpan = document.getElementById(`word-${actualWord}`);
                if (wordSpan && wordSpan.classList.contains('found')) {
                    if (isManual) alert("이미 찾은 단어입니다!");
                } else {
                    socket.emit('correctAnswer', { startX, startY, endX, endY, word: actualWord });
                }
            } else if (isManual) {
                alert("❌ 정답이 아닙니다. 다시 시도해 보세요!");
            }
        }

        socket.on('colorCells', (data) => {
            const { startX, startY, endX, endY, color } = data;
            const startCell = document.getElementById(`cell-${startY}-${startX}`);
            const endCell = document.getElementById(`cell-${endY}-${endX}`);
            const gridElement = document.getElementById('puzzle-grid');

            if (!startCell || !endCell) return;

            const x1 = startCell.offsetLeft + (startCell.offsetWidth / 2);
            const y1 = startCell.offsetTop + (startCell.offsetHeight / 2);
            const x2 = endCell.offsetLeft + (endCell.offsetWidth / 2);
            const y2 = endCell.offsetTop + (endCell.offsetHeight / 2);

            const length = Math.hypot(x2 - x1, y2 - y1) + startCell.offsetWidth;
            const angle = Math.atan2(y2 - y1, x2 - x1) * (180 / Math.PI);
            const cx = (x1 + x2) / 2;
            const cy = (y1 + y2) / 2;

            const line = document.createElement('div');
            line.className = 'answer-line';
            line.style.width = `${length}px`;
            line.style.height = `${startCell.offsetHeight}px`;
            line.style.backgroundColor = color;
            line.style.left = `${cx - length / 2}px`;
            line.style.top = `${cy - startCell.offsetHeight / 2}px`;
            line.style.transform = `rotate(${angle}deg)`;

            gridElement.appendChild(line);
        });
    </script>
</body>
</html>
